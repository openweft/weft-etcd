name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v3.6.0)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (riscv64 + loong64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,riscv64,loong64
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build + push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/riscv64,linux/loong64
          push: true
          build-args: |
            ETCD_VERSION=${{ steps.tag.outputs.tag }}
          tags: |
            ghcr.io/openweft/weft-etcd:${{ steps.tag.outputs.tag }}
            ghcr.io/openweft/weft-etcd:latest
          provenance: false
          sbom: false
